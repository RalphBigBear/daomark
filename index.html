<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DaoMark — The Way of Markdown. A minimalist Markdown editor inspired by Dao philosophy." />
  <title>DaoMark</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@300;400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/index.css" />
</head>
<body>
  <div id="app">
    <!-- Toolbar -->
    <header id="toolbar" class="toolbar">
      <div class="toolbar-left">
        <span class="app-logo" id="app-logo" data-i18n="app.emptyTitle">道</span>
        <div class="toolbar-divider"></div>
        <button id="btn-new" class="toolbar-btn" data-i18n-title="toolbar.new" title="新建 (⌘N)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        </button>
        <button id="btn-open" class="toolbar-btn" data-i18n-title="toolbar.open" title="打开 (⌘O)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button id="btn-save" class="toolbar-btn" data-i18n-title="toolbar.save" title="保存 (⌘S)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        </button>
        <button id="btn-export" class="toolbar-btn" data-i18n-title="toolbar.export" title="导出 HTML">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button id="btn-quick-save" class="toolbar-btn" data-i18n-title="toolbar.quickSave" title="快速保存">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </button>
      </div>
      <div class="toolbar-center">
        <div class="toolbar-divider"></div>
        <button id="btn-bold" class="toolbar-btn" data-i18n-title="toolbar.bold" title="加粗 (⌘B)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg>
        </button>
        <button id="btn-italic" class="toolbar-btn" data-i18n-title="toolbar.italic" title="斜体 (⌘I)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>
        </button>
        <button id="btn-heading" class="toolbar-btn" data-i18n-title="toolbar.heading" title="标题">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4v16"/><path d="M18 4v16"/><path d="M6 12h12"/></svg>
        </button>
        <button id="btn-strikethrough" class="toolbar-btn" data-i18n-title="toolbar.strikethrough" title="删除线 (⌘⇧X)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4H9a3 3 0 0 0-3 3v0a3 3 0 0 0 3 3h6a3 3 0 0 1 3 3v0a3 3 0 0 1-3 3H8"/><line x1="4" y1="12" x2="20" y2="12"/></svg>
        </button>
        <div class="toolbar-divider"></div>
        <button id="btn-quote" class="toolbar-btn" data-i18n-title="toolbar.quote" title="引用">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V21z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3z"/></svg>
        </button>
        <button id="btn-code" class="toolbar-btn" data-i18n-title="toolbar.code" title="行内代码 (⌘E)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </button>
        <button id="btn-codeblock" class="toolbar-btn" data-i18n-title="toolbar.codeblock" title="代码块 (⌘⇧K)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="9 8 5 12 9 16"/><polyline points="15 8 19 12 15 16"/></svg>
        </button>
        <div class="toolbar-divider"></div>
        <button id="btn-ul" class="toolbar-btn" data-i18n-title="toolbar.ul" title="无序列表">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1" fill="currentColor"/><circle cx="4" cy="12" r="1" fill="currentColor"/><circle cx="4" cy="18" r="1" fill="currentColor"/></svg>
        </button>
        <button id="btn-ol" class="toolbar-btn" data-i18n-title="toolbar.ol" title="有序列表">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="2" y="8" font-size="7" fill="currentColor" stroke="none" font-family="serif">1</text><text x="2" y="14" font-size="7" fill="currentColor" stroke="none" font-family="serif">2</text><text x="2" y="20" font-size="7" fill="currentColor" stroke="none" font-family="serif">3</text></svg>
        </button>
        <button id="btn-task" class="toolbar-btn" data-i18n-title="toolbar.task" title="任务列表">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="6" height="6" rx="1"/><polyline points="5 8 6 9 8 6.5"/><line x1="12" y1="8" x2="21" y2="8"/><rect x="3" y="14" width="6" height="6" rx="1"/><line x1="12" y1="17" x2="21" y2="17"/></svg>
        </button>
        <div class="toolbar-divider"></div>
        <button id="btn-link" class="toolbar-btn" data-i18n-title="toolbar.link" title="链接 (⌘K)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </button>
        <button id="btn-image" class="toolbar-btn" data-i18n-title="toolbar.image" title="图片">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </button>
        <button id="btn-hr" class="toolbar-btn" data-i18n-title="toolbar.hr" title="分割线">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"/></svg>
        </button>
        <button id="btn-table" class="toolbar-btn" data-i18n-title="toolbar.table" title="表格">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
        </button>
      </div>
      <div class="toolbar-right">
        <button id="btn-lang" class="toolbar-btn toolbar-btn-text" data-i18n-title="toolbar.lang" title="EN">
          <span data-i18n="toolbar.lang">EN</span>
        </button>
        <button id="btn-view-mode" class="toolbar-btn" data-i18n-title="toolbar.viewMode" title="切换视图">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
        </button>
        <button id="btn-theme" class="toolbar-btn" data-i18n-title="toolbar.theme" title="切换主题">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </header>

    <!-- Editor -->
    <main id="editor-container" class="editor-container" data-view="split">
      <div id="editor-pane" class="pane editor-pane">
        <textarea id="editor" class="editor-textarea" spellcheck="false"
          data-i18n-placeholder="app.placeholder"
          placeholder="落笔处，道自生…"></textarea>
      </div>
      <div id="resize-handle" class="resize-handle"></div>
      <div id="preview-pane" class="pane preview-pane">
        <article id="preview" class="preview-content markdown-body"></article>
      </div>
    </main>

    <!-- Status Bar -->
    <footer id="statusbar" class="statusbar">
      <span id="status-hint" class="status-hint" data-i18n="status.brand">DaoMark</span>
      <div class="statusbar-right">
        <span id="status-words" class="status-item">0 字</span>
        <span class="status-dot">&middot;</span>
        <span id="status-lines" class="status-item">0 行</span>
        <span class="status-dot">&middot;</span>
        <span id="status-cursor" class="status-item">行 1, 列 1</span>
      </div>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
